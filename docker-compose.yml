services:
  youtube-to-mp4:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube-to-mp4
    ports:
      - "5001:5000"
    environment:
      DOWNLOADS_DIR: /data/downloads
      TRANSCRIPTS_DIR: /data/transcripts
      YTDLP_COOKIES_FILE: /data/cookies/youtube.txt
      YTDLP_REMOTE_COMPONENTS: ejs:github
      STT_API_URL: http://stt-service:8000
      STT_DEFAULT_MODEL: large-v3
      STT_SHARED_STORAGE: "true"
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      APP_DEBUG: "false"
    volumes:
      - ./video-storage:/data/downloads
      - ./transcripts:/data/transcripts
      - ./cookies:/data/cookies:ro
    depends_on:
      - stt-service
    restart: unless-stopped

  stt-service:
    build:
      context: .
      dockerfile: docker/stt/Dockerfile.mac-m4
    container_name: youtube-to-mp4-stt
    environment:
      STT_INPUT_DIR: /data/input
      STT_OUTPUT_DIR: /data/output
      STT_DEFAULT_MODEL: small
      STT_DEVICE: cpu
      STT_COMPUTE_TYPE_CPU: int8
      HF_HOME: /models/huggingface
    volumes:
      - ./video-storage:/data/input:ro
      - ./transcripts:/data/output
      - ./models:/models/huggingface
    restart: unless-stopped
